<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RATE NETWORK Chat</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #fff;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 16px;
    text-align: center;
    border-bottom: 1px solid #2a2a4a;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header h1 { font-size: 18px; font-weight: 700; color: #a78bfa; }
  .header p  { font-size: 12px; color: #888; margin-top: 2px; }
  .search-wrap {
    padding: 12px 16px;
    background: #111;
    position: sticky;
    top: 70px;
    z-index: 9;
  }
  .search-box {
    width: 100%;
    padding: 10px 16px;
    border-radius: 12px;
    border: 1px solid #2a2a4a;
    background: #1a1a2e;
    color: #fff;
    font-size: 14px;
    outline: none;
  }
  .search-box::placeholder { color: #555; }
  .search-container { position: relative; }
  .section-title {
    padding: 12px 16px 6px;
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .room-list { padding: 0 16px 80px; }
  .room-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    background: #1a1a2e;
    border-radius: 12px;
    margin-bottom: 8px;
    border: 1px solid #2a2a4a;
    transition: border-color 0.2s;
  }
  .room-card:hover { border-color: #a78bfa; }
  .room-info { display: flex; align-items: center; gap: 10px; }
  .room-flag { font-size: 28px; line-height: 1; }
  .room-name { font-size: 14px; font-weight: 600; color: #e2e8f0; }
  .room-meta { font-size: 11px; color: #666; margin-top: 2px; }
  .btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .btn:active { opacity: 0.7; }
  .btn-join   { background: #a78bfa; color: #fff; }
  .btn-create { background: transparent; color: #a78bfa; border: 1px solid #a78bfa; }
  .divider {
    height: 1px;
    background: #2a2a4a;
    margin: 8px 0 12px;
  }
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #555;
  }
  .empty-state p { font-size: 14px; }
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #a78bfa;
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .loading {
    text-align: center;
    padding: 40px;
    color: #555;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #2a2a4a;
    border-top-color: #a78bfa;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .badge {
    background: #22c55e22;
    color: #22c55e;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    margin-left: 6px;
    font-weight: 600;
  }
</style>

let activeRooms = {};   // country_code → room 객체
let query = "";

// ── 초기 로드 ──────────────────────────────────────────────
async function loadRooms() {
  try {
    const res  = await fetch(`${API_BASE}/chat/rooms`);
    const data = await res.json();
    activeRooms = {};
    (data.rooms || []).forEach(r => { activeRooms[r.country_code] = r; });
  } catch(e) {
    console.error("Failed to load rooms:", e);
  }
  document.getElementById("loadingState").style.display  = "none";
  document.getElementById("mainContent").style.display   = "block";
  renderAll();
}

function renderAll() {
  const q = query.toLowerCase();
  const filtered = ALL_COUNTRIES.filter(c =>
    c.name.toLowerCase().includes(q) || c.code.toLowerCase().includes(q)
  );

  const active    = filtered.filter(c => activeRooms[c.code]);
  const available = filtered.filter(c => !activeRooms[c.code]);

  // Active rooms
  const activeEl = document.getElementById("activeRooms");
  document.getElementById("activeSection").style.display = active.length ? "block" : "none";
  activeEl.innerHTML = active.map(c => {
    const r = activeRooms[c.code];
    return `
    <div class="room-card">
      <div class="room-info">
        <span class="room-flag">${c.flag}</span>
        <div>
          <div class="room-name">${c.name} <span class="badge">ACTIVE</span></div>
          <div class="room-meta">Created by user #${r.creator_id?.slice(-4) || "???"}</div>
        </div>
      </div>
      <button class="btn btn-join" onclick="joinRoom('${c.code}')">Join</button>
    </div>`;
  }).join("");

  // Available (create)
  const availEl = document.getElementById("availableRooms");
  document.getElementById("availableSection").style.display = available.length ? "block" : "none";
  availEl.innerHTML = available.map(c => `
    <div class="room-card">
      <div class="room-info">
        <span class="room-flag">${c.flag}</span>
        <div>
          <div class="room-name">${c.name}</div>
          <div class="room-meta">No room yet</div>
        </div>
      </div>
      <button class="btn btn-create" onclick="createRoom('${c.code}','${c.name}','${c.flag}')">Create</button>
    </div>
  `).join("");

  if (filtered.length === 0) {
    activeEl.innerHTML  = "";
    availEl.innerHTML   = `<div class="empty-state"><p>No countries found for "${query}"</p></div>`;
    document.getElementById("activeSection").style.display    = "none";
    document.getElementById("availableSection").style.display = "block";
  }
}

// ── 방 참여 ────────────────────────────────────────────────
async function joinRoom(code) {
  showToast("Sending invite link to Telegram...");
  try {
    const res  = await fetch(`${API_BASE}/chat/join`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ user_id: userId, country_code: code, secret: SECRET })
    });
    const data = await res.json();
    if (data.ok) showToast("✅ Check your Telegram DM for the invite link!");
    else         showToast("❌ " + (data.error || "Failed"));
  } catch(e) {
    showToast("❌ Connection error");
  }
}

// ── 방 생성 ────────────────────────────────────────────────
async function createRoom(code, name, flag) {
  if (userId === "unknown") {
    showToast("⚠️ Please open from Telegram");
    return;
  }
  showToast("Creating room...");
  try {
    const res  = await fetch(`${API_BASE}/chat/create_room`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ user_id: userId, country_code: code, country_name: name, country_flag: flag, secret: SECRET })
    });
    const data = await res.json();
    if (data.ok) {
      activeRooms[code] = data.room;
      renderAll();
      if (data.already_exists) showToast("✅ Room already exists! Invite link sent.");
      else                     showToast("🎉 Room created! Check your Telegram DM!");
    } else {
      showToast("❌ " + (data.error || "Failed"));
    }
  } catch(e) {
    showToast("❌ Connection error");
  }
}

// ── 검색 ──────────────────────────────────────────────────
document.getElementById("searchInput").addEventListener("input", function() {
  query = this.value.trim();
  renderAll();
});

// ── 토스트 ────────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove("show"), 3000);
}

loadRooms();
