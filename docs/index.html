<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RATE NETWORK - Mining</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .logo {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #f0c040, #e87d20);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #8b949e;
      margin-bottom: 40px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 32px 28px;
      width: 100%;
      max-width: 340px;
      text-align: center;
    }

    .mining-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 1.3rem;
      margin-bottom: 10px;
      color: #f0f6fc;
    }

    .card p {
      font-size: 0.88rem;
      color: #8b949e;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px 0;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f0c040, #e87d20);
      color: #0d1117;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .btn-success {
      background: linear-gradient(135deg, #3fb950, #2ea043);
      color: #ffffff;
    }

    /* 광고 컨테이너 */
    #ad-container {
      display: none;
      width: 100%;
      margin-bottom: 20px;
    }

    /* 상태 메시지 */
    #status {
      margin-top: 16px;
      font-size: 0.85rem;
      color: #8b949e;
      min-height: 24px;
    }

    .status-success { color: #3fb950 !important; }
    .status-error   { color: #f85149 !important; }
    .status-loading { color: #f0c040 !important; }

    /* 로딩 스피너 */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid #30363d;
      border-top-color: #f0c040;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .step {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #30363d;
    }

    .step.active { background: #f0c040; }
    .step.done   { background: #3fb950; }
  </style>
</head>
<body>

  <div class="logo">RATE NETWORK</div>
  <div class="subtitle">⛏️ Mine RATE Coins</div>

  <div class="card">
    <div class="step-indicator">
      <div class="step" id="step1"></div>
      <div class="step" id="step2"></div>
      <div class="step" id="step3"></div>
    </div>

    <div class="mining-icon" id="mining-icon">⛏️</div>
    <h2 id="card-title">Watch an Ad</h2>
    <p id="card-desc">
      Watch a short video ad to earn RATE coins.<br/>
      Up to <strong>10 ads</strong> per day (UTC reset).
    </p>

    <div id="ad-container"></div>

    <button class="btn btn-primary" id="main-btn" onclick="startMining()">
      ▶️ Watch Ad &amp; Mine
    </button>

    <div id="status"></div>
  </div>

  <!-- Monetag Rewarded Interstitial 스크립트 -->
  <script src="//libtl.com/sdk.js" data-zone="10784949" data-sdk="show_10784949"></script>

  <script>
    // Telegram WebApp 초기화
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // UI 요소
    const btn   = document.getElementById("main-btn");
    const status = document.getElementById("status");
    const title  = document.getElementById("card-title");
    const desc   = document.getElementById("card-desc");
    const icon   = document.getElementById("mining-icon");
    const step1  = document.getElementById("step1");
    const step2  = document.getElementById("step2");
    const step3  = document.getElementById("step3");

    let adWatched = false;
    let adReady   = false;
    let currentYmid = "";
    const userId  = tg.initDataUnsafe?.user?.id?.toString() || "unknown";

    function generateYmid() {
      return Math.random().toString(36).substr(2, 12) + Date.now().toString(36);
    }

    // ── 단계 표시 ──────────────────────────────────
    function setStep(n) {
      [step1, step2, step3].forEach((s, i) => {
        s.className = "step" + (i + 1 < n ? " done" : i + 1 === n ? " active" : "");
      });
    }

    // ── 상태 메시지 ────────────────────────────────
    function setStatus(msg, type = "") {
      status.innerHTML = msg;
      status.className = type ? `status-${type}` : "";
    }

    // ── 광고 프리로드 (페이지 로드 시 미리 준비) ──────
    function preloadAd() {
      if (typeof show_10784949 === "undefined") return;
      show_10784949({ type: "preload", ymid: userId })
        .then(() => {
          adReady = true;
          btn.disabled = false;
          setStatus("✅ Ad ready. Press the button!", "success");
          setTimeout(() => setStatus(""), 2000);
        })
        .catch(() => { adReady = false; });
    }

    // SDK 로드 완료 후 프리로드 시작
    btn.disabled = true;
    setStatus('<span class="spinner"></span>Loading ad...', "loading");
    window.addEventListener("load", () => {
      // 최대 5초 기다린 후 SDK 존재 여부 확인
      let waited = 0;
      const checkSDK = setInterval(() => {
        waited += 500;
        if (typeof show_10784949 !== "undefined") {
          clearInterval(checkSDK);
          preloadAd();
        } else if (waited >= 5000) {
          clearInterval(checkSDK);
          // SDK 로드 실패 - 버튼은 활성화하되 광고 없이 진행 불가 알림
          btn.disabled = false;
          setStatus("⚠️ Ad SDK failed to load.", "error");
        }
      }, 500);
    });

    // ── 광고 시청 시작 ──────────────────────────────
    function startMining() {
      if (adWatched) return;

      btn.disabled = true;
      setStep(2);
      title.textContent = "Ad is playing...";
      desc.innerHTML = "Please watch the full ad to earn your reward.";
      icon.textContent = "📺";
      setStatus('<span class="spinner"></span>Ad playing... please wait', "loading");

      if (typeof show_10784949 === "undefined") {
        setStatus("❌ Ad script not loaded. Please try again.", "error");
        btn.disabled = false;
        title.textContent = "Watch an Ad";
        desc.innerHTML = "Watch a short video ad to earn RATE coins.<br/>Up to <strong>10 ads</strong> per day (UTC reset).";
        icon.textContent = "⛏️";
        setStep(1);
        return;
      }

      // 광고마다 고유한 ymid 생성
      currentYmid = generateYmid();

      // 30초 타임아웃
      const adTimeout = new Promise((_, reject) =>
        setTimeout(() => reject(new Error("timeout")), 30000)
      );

      Promise.race([show_10784949({ ymid: currentYmid }), adTimeout]).then(() => {
        onAdCompleted();
      }).catch((err) => {
        const msg = err?.message === "timeout"
          ? "⏱️ Ad timed out. Please try again."
          : "❌ Ad failed to load. Please try again.";
        setStatus(msg, "error");
        btn.disabled = false;
        title.textContent = "Watch an Ad";
        desc.innerHTML = "Watch a short video ad to earn RATE coins.<br/>Up to <strong>10 ads</strong> per day (UTC reset).";
        icon.textContent = "⛏️";
        setStep(1);
      });
    }

    // ── 광고 완료 콜백 ──────────────────────────────
    function onAdCompleted() {
      adWatched = true;
      setStep(3);
      icon.textContent  = "✅";
      title.textContent = "Ad Complete!";
      desc.innerHTML    = "Great job! Sending your reward...";
      setStatus('<span class="spinner"></span>Processing reward...', "loading");
      // 즉시 전송 (미니앱이 이동되기 전에)
      sendRewardToBot();
    }

    // ── 봇에 결과 전송 ──────────────────────────────
    function sendRewardToBot() {
      try {
        const payload = JSON.stringify({
          action: "ad_completed",
          ymid: currentYmid,
          timestamp: Date.now(),
        });
        tg.sendData(payload);

        setStatus("✅ Reward sent! Check your balance.", "success");
        btn.textContent = "✅ Done!";
        btn.className   = "btn btn-success";
        btn.disabled    = false;
        btn.onclick     = () => tg.close();

      } catch (err) {
        console.error("sendData error:", err);
        setStatus("❌ Error sending reward. Please try again.", "error");
        btn.disabled = false;
        btn.textContent = "▶️ Watch Ad & Mine";
        btn.onclick = startMining;
        adWatched = false;
        setStep(1);
      }
    }

    // 초기 단계 설정
    setStep(1);
  </script>

</body>
</html>
